# Configuration Apache pour Alex2
# À copier dans le conteneur Docker : /etc/apache2/conf-available/alex2.conf
# Puis activer avec : a2enconf alex2 && service apache2 reload

<Directory /var/www/html/Alex2>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory /var/www/html/Alex2/public>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>
