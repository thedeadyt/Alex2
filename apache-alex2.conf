# Configuration Apache pour Alex2
# À ajouter dans votre conteneur Docker ou dans /etc/apache2/sites-available/

<Directory /var/www/html/Alex2/public>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Si vous voulez créer un alias pour éviter /Alex2/public dans l'URL
# Décommentez les lignes suivantes:
# Alias /Alex2 /var/www/html/Alex2/public
# <Directory /var/www/html/Alex2/public>
#     Options Indexes FollowSymLinks
#     AllowOverride All
#     Require all granted
# </Directory>
